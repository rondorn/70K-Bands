# Open Metal Fest Admin — staged GitHub Release + optional CI macOS artifact
#
# Triggers on push to master (promoter_admin changes) and manual run.
# When pubspec version/build is incremented:
#   1. stage-draft-release — creates a draft release on tag omf-admin-macos
#      (notes only, no binary). Upload your zip, then publish the draft.
#   2. build-macos — builds a workflow artifact you can optionally attach.
#
# The jobs fail the version check unless promoter_admin/pubspec.yaml version
# was incremented versus the previous master tip (push) or parent commit.
#
# Optional signing / notarization on the CI artifact (Developer ID):
#   MACOS_CERTIFICATE, MACOS_CERTIFICATE_PASSWORD, MACOS_CERTIFICATE_NAME
#   MACOS_PROVISIONING_PROFILE_BASE64 (required to codesign with iCloud entitlements)
#   APPLE_TEAM_ID (optional; defaults to K35L7F3E4S)
# Notary: APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD
#   — or — APPLE_API_KEY_BASE64 + APPLE_API_KEY_ID + APPLE_API_ISSUER

name: Promoter Admin macOS

on:
  push:
    branches: [master]
    paths:
      - 'promoter_admin/**'
      - '.github/workflows/promoter-admin-macos.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage-draft-release:
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.version.outputs.full }}
      name: ${{ steps.version.outputs.name }}
      number: ${{ steps.version.outputs.number }}
      zip: ${{ steps.version.outputs.zip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require pubspec version bump
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          current=$(grep -E '^version:' promoter_admin/pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//')
          if [[ ! "$current" =~ ^[0-9.]+\+[0-9]+$ ]]; then
            echo "::error::Unexpected pubspec version '$current' (expected name+number, e.g. 1.0.2+1)"
            exit 1
          fi

          before_ref=""
          if [[ "$EVENT_NAME" == "push" && -n "${EVENT_BEFORE:-}" && "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]]; then
            before_ref="$EVENT_BEFORE"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            before_ref="$(git rev-parse HEAD^)"
          fi

          previous=""
          if [[ -n "$before_ref" ]]; then
            previous=$(git show "${before_ref}:promoter_admin/pubspec.yaml" 2>/dev/null \
              | grep -E '^version:' | head -1 | sed 's/version:[[:space:]]*//' || true)
          fi

          echo "Current version:  $current"
          echo "Previous version: ${previous:-(none)}"
          if [[ -n "$previous" && "$previous" == "$current" ]]; then
            echo "::error::promoter_admin/pubspec.yaml version was not incremented (still $current). Bump version/build (e.g. 1.0.2+2) before running the admin build workflow."
            exit 1
          fi
          echo "Version bump OK."

      - name: Read version from pubspec
        id: version
        run: |
          full=$(grep -E '^version:' promoter_admin/pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//')
          name="${full%%+*}"
          number="${full##*+}"
          zip="omf-admin-macos-${name}_${number}.zip"
          {
            echo "full=$full"
            echo "name=$name"
            echo "number=$number"
            echo "zip=$zip"
          } >> "$GITHUB_OUTPUT"
          echo "Staging draft for $full → expect asset $zip"

      - name: Stage draft GitHub Release (awaiting binary upload)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_FULL: ${{ steps.version.outputs.full }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_NUMBER: ${{ steps.version.outputs.number }}
          ZIP_NAME: ${{ steps.version.outputs.zip }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Replace any existing release for this rolling tag so old binaries
          # do not linger on a "new version" draft.
          if gh release view omf-admin-macos >/dev/null 2>&1; then
            gh release delete omf-admin-macos --yes
          fi
          git push origin :refs/tags/omf-admin-macos 2>/dev/null || true

          notes=$(cat <<EOF
          ## Open Metal Fest Admin for macOS

          **Version:** ${VERSION_FULL}

          ### Status: draft — binary not attached yet

          1. Build/sign/notarize locally (or download the CI workflow artifact).
          2. Upload asset named \`${ZIP_NAME}\` to this release.
          3. Publish the draft when the zip is attached.

          \`\`\`bash
          gh release upload omf-admin-macos ./${ZIP_NAME} --clobber
          gh release edit omf-admin-macos --draft=false
          \`\`\`

          Stable release page (after publish):
          https://github.com/${REPO}/releases/tag/omf-admin-macos

          ### Install (once published)
          1. Download and unzip.
          2. Drag **Open Metal Fest Admin** to Applications (optional).
          3. Open the app.

          ### If macOS blocks the app
          - **Signed + notarized builds:** confirm the first-open dialog.
          - **Unsigned / not notarized:** Right-click the app → **Open** → **Open**.
            Or: System Settings → Privacy & Security → **Open Anyway**.

          Staged from commit \`${COMMIT_SHA}\` on \`master\`.
          EOF
          )

          notes="$(printf '%s\n' "$notes" | sed -e 's/^          //')"

          gh release create omf-admin-macos \
            --draft \
            --title "Open Metal Fest Admin macOS ${VERSION_NAME}_${VERSION_NUMBER}" \
            --notes "$notes" \
            --target "$COMMIT_SHA"

          echo "Draft release staged: https://github.com/${REPO}/releases"
          echo "Upload ${ZIP_NAME}, then publish the draft."

  build-macos:
    needs: stage-draft-release
    runs-on: macos-latest
    defaults:
      run:
        working-directory: promoter_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Use staged version outputs
        id: version
        run: |
          {
            echo "full=${{ needs.stage-draft-release.outputs.full }}"
            echo "name=${{ needs.stage-draft-release.outputs.name }}"
            echo "number=${{ needs.stage-draft-release.outputs.number }}"
            echo "zip=${{ needs.stage-draft-release.outputs.zip }}"
          } >> "$GITHUB_OUTPUT"
          echo "Building ${{ needs.stage-draft-release.outputs.full }} → ${{ needs.stage-draft-release.outputs.zip }}"

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Locate built app
        id: app
        run: |
          app="build/macos/Build/Products/Release/Open Metal Fest Admin.app"
          if [[ ! -d "$app" ]]; then
            echo "App not found at $app"
            find build/macos -name '*.app' -print || true
            exit 1
          fi
          echo "path=$app" >> "$GITHUB_OUTPUT"

      # Secrets cannot be used in job/step `if:` — detect inside the step.
      - name: Import Developer ID certificate
        id: signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE" || -z "$MACOS_CERTIFICATE_PASSWORD" || -z "$MACOS_CERTIFICATE_NAME" ]]; then
            echo "No Developer ID secrets — building unsigned artifact."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Imported Developer ID certificate"

      - name: Codesign app (Developer ID + hardened runtime)
        id: codesign
        if: steps.signing.outputs.enabled == 'true'
        env:
          CERT_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          APP="${{ steps.app.outputs.path }}"
          ENTITLEMENTS="macos/Runner/ReleaseDistribution.entitlements"
          find "$APP" \( -name '._*' -o -name '.DS_Store' \) -delete 2>/dev/null || true

          if [[ -z "$MACOS_PROVISIONING_PROFILE_BASE64" ]]; then
            echo "::warning::MACOS_PROVISIONING_PROFILE_BASE64 not set — skipping codesign (unsigned artifact only)."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"

          echo "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > "$APP/Contents/embedded.provisionprofile"
          echo "Embedded Developer ID provisioning profile (iCloud entitlements)"

          while IFS= read -r -d '' bin; do
            codesign --force --options runtime --timestamp \
              --sign "$CERT_NAME" "$bin" || true
          done < <(find "$APP/Contents/Frameworks" "$APP/Contents/MacOS" \
            \( -name '*.dylib' -o -name '*.so' -o -type f -perm +111 \) \
            -print0 2>/dev/null)

          while IFS= read -r -d '' fw; do
            codesign --force --options runtime --timestamp \
              --sign "$CERT_NAME" "$fw"
          done < <(find "$APP/Contents/Frameworks" -name '*.framework' -print0 2>/dev/null)

          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$CERT_NAME" "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "Codesign OK"

      - name: Notarize and staple
        id: notarize
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEFAULT_APPLE_TEAM_ID: K35L7F3E4S
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          PROFILE_SKIPPED: ${{ steps.codesign.outputs.skipped }}
        run: |
          if [[ "${PROFILE_SKIPPED:-}" == "true" ]]; then
            echo "Codesign was skipped — skipping notarization."
            echo "stapled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Detect missing profile without depending on a missing step id.
          if [[ ! -f "${{ steps.app.outputs.path }}/Contents/embedded.provisionprofile" ]]; then
            echo "No embedded provisioning profile — skipping notarization."
            echo "stapled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          APP="${{ steps.app.outputs.path }}"
          SUBMIT_ZIP="$RUNNER_TEMP/omf-admin-submit.zip"
          find "$APP" \( -name '._*' -o -name '.DS_Store' \) -delete 2>/dev/null || true
          export COPYFILE_DISABLE=1
          ditto -c -k --keepParent --norsrc --noextattr "$APP" "$SUBMIT_ZIP"

          if [[ -n "$APPLE_API_KEY_BASE64" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" ]]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
            xcrun notarytool submit "$SUBMIT_ZIP" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
          elif [[ -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            TEAM_ID="${APPLE_TEAM_ID:-$DEFAULT_APPLE_TEAM_ID}"
            xcrun notarytool submit "$SUBMIT_ZIP" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait
          else
            echo "Signing secrets present but notary credentials missing — skipping notarization."
            echo "stapled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          xcrun stapler staple "$APP"
          echo "stapled=true" >> "$GITHUB_OUTPUT"
          echo "Notarization stapled OK"

      - name: Zip app for distribution
        env:
          ZIP_NAME: ${{ steps.version.outputs.zip }}
        run: |
          APP="${{ steps.app.outputs.path }}"
          find "$APP" \( -name '._*' -o -name '.DS_Store' \) -delete 2>/dev/null || true
          export COPYFILE_DISABLE=1
          ditto -c -k --keepParent --norsrc --noextattr "$APP" "../$ZIP_NAME"
          junk="$(unzip -l "../$ZIP_NAME" | grep -c '\._' || true)"
          if [[ "$junk" -gt 0 ]]; then
            echo "ERROR: zip contains $junk AppleDouble (._*) entries" >&2
            exit 1
          fi
          ls -lh "../$ZIP_NAME"

      - name: Upload workflow artifact (optional source for release zip)
        uses: actions/upload-artifact@v4
        with:
          name: omf-admin-macos-${{ steps.version.outputs.name }}_${{ steps.version.outputs.number }}
          path: ${{ steps.version.outputs.zip }}
