# Open Metal Fest Admin — Windows build + GitHub Release
#
# Triggers on push to master (promoter_admin changes) and manual run.
# Publishes a downloadable zip on the rolling release tag: omf-admin-windows
#   → https://github.com/<org>/<repo>/releases/tag/omf-admin-windows
#
# Only the latest Windows release is kept: the previous omf-admin-windows
# release (and its assets) is deleted before publishing the new one.
#
# The job fails unless promoter_admin/pubspec.yaml version was incremented
# versus the previous master tip (push) or parent commit (manual run).
#
# Prefer GitHub Releases over committing zips into the git tree (binaries
# bloat the repo). The release page is the stable download “directory”.

name: Promoter Admin Windows

on:
  push:
    branches: [master]
    paths:
      - 'promoter_admin/**'
      - '.github/workflows/promoter-admin-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: promoter_admin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require pubspec version bump
        working-directory: .
        shell: pwsh
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          $line = Select-String -Path promoter_admin/pubspec.yaml -Pattern '^version:\s*(.+)$' |
            Select-Object -First 1
          if ($null -eq $line) { throw "No version: line in promoter_admin/pubspec.yaml" }
          $current = $line.Matches.Groups[1].Value.Trim()
          if ($current -notmatch '^([0-9.]+)\+(\d+)$') {
            throw "Unexpected pubspec version: $current (expected name+number, e.g. 1.0.2+1)"
          }

          $beforeRef = $null
          if ($env:EVENT_NAME -eq 'push' -and
              -not [string]::IsNullOrWhiteSpace($env:EVENT_BEFORE) -and
              $env:EVENT_BEFORE -ne '0000000000000000000000000000000000000000') {
            $beforeRef = $env:EVENT_BEFORE
          } else {
            git rev-parse --verify HEAD^ 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              $beforeRef = (git rev-parse HEAD^).Trim()
            }
          }

          $previous = $null
          if ($beforeRef) {
            $prevContent = git show "${beforeRef}:promoter_admin/pubspec.yaml" 2>$null
            if ($LASTEXITCODE -eq 0 -and $prevContent) {
              $prevLine = $prevContent |
                Select-String -Pattern '^version:\s*(.+)$' |
                Select-Object -First 1
              if ($prevLine) {
                $previous = $prevLine.Matches.Groups[1].Value.Trim()
              }
            }
          }

          Write-Host "Current version:  $current"
          Write-Host "Previous version: $(if ($previous) { $previous } else { '<(none)>' })"
          if ($previous -and $previous -eq $current) {
            throw "promoter_admin/pubspec.yaml version was not incremented (still $current). Bump version/build (e.g. 1.0.2+2) before running the admin build workflow."
          }
          Write-Host "Version bump OK."

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version from pubspec
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' |
            Select-Object -First 1
          $full = $line.Matches.Groups[1].Value.Trim()
          if ($full -notmatch '^([0-9.]+)\+(\d+)$') {
            throw "Unexpected pubspec version: $full (expected name+number, e.g. 1.0.2+1)"
          }
          $name = $Matches[1]
          $number = $Matches[2]
          $zip = "omf-admin-windows-${name}_${number}.zip"
          "full=$full" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "number=$number" >> $env:GITHUB_OUTPUT
          "zip=$zip" >> $env:GITHUB_OUTPUT
          Write-Host "Building $full → $zip"

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Zip release folder
        shell: pwsh
        env:
          ZIP_NAME: ${{ steps.version.outputs.zip }}
        run: |
          $zip = Join-Path .. $env:ZIP_NAME
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath $zip
          Write-Host "Created $zip"

      - uses: actions/upload-artifact@v4
        with:
          name: omf-admin-windows-${{ steps.version.outputs.name }}_${{ steps.version.outputs.number }}
          path: ${{ steps.version.outputs.zip }}

      - name: Remove previous Windows release (keep latest only)
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view omf-admin-windows >/dev/null 2>&1; then
            gh release delete omf-admin-windows --yes
          fi
          git push origin :refs/tags/omf-admin-windows 2>/dev/null || true

      - name: Publish GitHub Release (latest only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: omf-admin-windows
          target_commitish: ${{ github.sha }}
          name: Open Metal Fest Admin Windows ${{ steps.version.outputs.name }}_${{ steps.version.outputs.number }}
          make_latest: true
          body: |
            ## Open Metal Fest Admin for Windows

            **Version:** ${{ steps.version.outputs.full }}

            ### Download
            Use the **Assets** zip below (`${{ steps.version.outputs.zip }}`).

            Latest Windows build:
            https://github.com/${{ github.repository }}/releases/tag/omf-admin-windows

            ### Install
            1. Download and unzip.
            2. Run `promoter_admin.exe` (or the runner exe in the folder).

            Built from commit `${{ github.sha }}` on `master`.
          files: ${{ steps.version.outputs.zip }}
          fail_on_unmatched_files: true
