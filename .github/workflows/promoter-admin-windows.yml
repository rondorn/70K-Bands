name: Promoter Admin Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: promoter_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version from pubspec
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' |
            Select-Object -First 1
          $full = $line.Matches.Groups[1].Value.Trim()
          if ($full -notmatch '^([0-9.]+)\+(\d+)$') {
            throw "Unexpected pubspec version: $full (expected name+number, e.g. 1.0.1+17)"
          }
          $name = $Matches[1]
          $number = $Matches[2]
          $zip = "omf-admin-windows-${name}_${number}.zip"
          "full=$full" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "number=$number" >> $env:GITHUB_OUTPUT
          "zip=$zip" >> $env:GITHUB_OUTPUT
          Write-Host "Building $full → $zip"

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Zip release folder
        shell: pwsh
        env:
          ZIP_NAME: ${{ steps.version.outputs.zip }}
        run: |
          $zip = Join-Path .. $env:ZIP_NAME
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath $zip
          Write-Host "Created $zip"

      - uses: actions/upload-artifact@v4
        with:
          name: omf-admin-windows-${{ steps.version.outputs.name }}_${{ steps.version.outputs.number }}
          path: ${{ steps.version.outputs.zip }}
