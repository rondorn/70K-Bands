# Open Metal Fest Admin — Windows build + GitHub Release
#
# Triggers on push to master (promoter_admin changes) and manual run.
# Publishes a downloadable zip on the rolling release tag: omf-admin-windows
#   → https://github.com/<org>/<repo>/releases/tag/omf-admin-windows
#
# Prefer GitHub Releases over committing zips into the git tree (binaries
# bloat the repo). The release page is the stable download “directory”.

name: Promoter Admin Windows

on:
  push:
    branches: [master]
    paths:
      - 'promoter_admin/**'
      - '.github/workflows/promoter-admin-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: promoter_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version from pubspec
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' |
            Select-Object -First 1
          $full = $line.Matches.Groups[1].Value.Trim()
          if ($full -notmatch '^([0-9.]+)\+(\d+)$') {
            throw "Unexpected pubspec version: $full (expected name+number, e.g. 1.0.1+17)"
          }
          $name = $Matches[1]
          $number = $Matches[2]
          $zip = "omf-admin-windows-${name}_${number}.zip"
          "full=$full" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "number=$number" >> $env:GITHUB_OUTPUT
          "zip=$zip" >> $env:GITHUB_OUTPUT
          Write-Host "Building $full → $zip"

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Zip release folder
        shell: pwsh
        env:
          ZIP_NAME: ${{ steps.version.outputs.zip }}
        run: |
          $zip = Join-Path .. $env:ZIP_NAME
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath $zip
          Write-Host "Created $zip"

      - uses: actions/upload-artifact@v4
        with:
          name: omf-admin-windows-${{ steps.version.outputs.name }}_${{ steps.version.outputs.number }}
          path: ${{ steps.version.outputs.zip }}

      - name: Publish GitHub Release (easy download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: omf-admin-windows
          target_commitish: ${{ github.sha }}
          name: Open Metal Fest Admin Windows ${{ steps.version.outputs.name }}_${{ steps.version.outputs.number }}
          body: |
            ## Open Metal Fest Admin for Windows

            **Version:** ${{ steps.version.outputs.full }}

            ### Download
            Use the **Assets** zip below (`${{ steps.version.outputs.zip }}`).

            Stable release page (always latest master build):
            https://github.com/${{ github.repository }}/releases/tag/omf-admin-windows

            ### Install
            1. Download and unzip.
            2. Run `promoter_admin.exe` (or the runner exe in the folder).

            Built from commit `${{ github.sha }}` on `master`.
          files: ${{ steps.version.outputs.zip }}
          fail_on_unmatched_files: true
