{% if band_list_source_local %}
<div class="hint">Band list from your local lineup file (always current).</div>
{% elif band_list_cache %}
<div class="hint">
  Band list from published URL
  {% if band_list_cache.from_cache %} (cached {{ band_list_cache.age_label }}){% endif %}.
  {% if band_list_refresh_return_to %}
  <input type="hidden" name="return_to" value="{{ band_list_refresh_return_to }}">
  {% endif %}
  <button type="submit"
    class="secondary"
    formaction="{{ band_list_refresh_url }}"
    formmethod="post"
    name="band_list_refresh"
    value="1">Refresh</button>
</div>
{% endif %}
