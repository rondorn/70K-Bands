{% if data_sync.uses_staging %}
<div class="staging-list-toolbar" id="stagingSyncToolbar"
  data-auto-sync="{{ '1' if data_sync.needs_auto_sync else '0' }}"
  data-debounce-seconds="{{ data_sync.auto_sync_debounce_seconds }}"
  data-sync-url="{{ sync_url }}">
  <div class="staging-sync-status" id="stagingSyncStatusText">
    {{ data_sync.status_label }}
  </div>
  {% if published_url %}
  <div class="hint">Apps read the published file after sync.</div>
  {% endif %}
  <div class="staging-sync-actions">
    {% if data_sync.has_pending %}
    <button type="button" class="btn" id="stagingSyncNowBtn">Sync now</button>
    {% endif %}
    <form method="post" action="{{ reload_url }}" class="inline-form staging-refresh-form"
      onsubmit="return confirm('Refresh the working copy from the published Dropbox file? Unsaved local changes will be lost.');">
      <input type="hidden" name="return_to" value="{{ reload_return_to }}">
      <button type="submit" class="link-button">Refresh data</button>
    </form>
  </div>
</div>
{% endif %}
