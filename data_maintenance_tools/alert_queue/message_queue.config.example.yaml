# Example config for monitorMessageQueue.py
# setup.sh copies this to message_queue.config.yaml in this directory (gitignored).
# Fill in local Dropbox paths and credentials; do not commit the live file.

# FCM topic used when a festival omits topic/channel
default_topic: global

# Optional override (default: ~/omf_message_queue.log)
log_file: ~/omf_message_queue.log

# Directory of Firebase service-account JSON files (gitignored).
# For credentials_tag: mdf  the monitor looks for:
#   mdf.json
#   google{tag}Auth.json   e.g. google70KbandsAuth.json
#   mdf-firebase-adminsdk.json
credentials_dir: ~/omf_fcm_credentials

# Multiple festivals may share the same Google login / machine credentials dir;
# each festival still needs its own Firebase project service-account JSON
# (apps are isolated per Firebase project).
festivals:
  - id: mdf
    name: MDF
    default_title: "MDF Band Announcement"
    # Local synced Dropbox folder (same folder admin writes .pending into)
    dropbox_dir: "/Users/YOU/Library/CloudStorage/Dropbox/OpenMetalFestAlertFolder/MDF"
    # Tag → JSON under credentials_dir; if missing, falls back to ADC/OAuth.
    # Optional Firebase project id (needed for multi-festival ADC):
    # project_id: your-mdf-firebase-project-id
    credentials_tag: mdf
    topic: global

  - id: rwmf
    name: RWMF
    default_title: "RWMF Band Announcement"
    dropbox_dir: "/Users/YOU/Library/CloudStorage/Dropbox/OpenMetalFestAlertFolder/RWMF"
    credentials_tag: rwmf
    topic: global

  - id: 70k
    name: "70K"
    default_title: "70K Bands Alert"
    dropbox_dir: "/Users/YOU/Library/CloudStorage/Dropbox/OpenMetalFestAlertFolder/70K"
    # Explicit file also works (matches older DetectChanges naming):
    credentials_file: ~/omf_fcm_credentials/google70KbandsAuth.json
    topic: global
