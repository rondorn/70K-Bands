# Example config for monitorMessageQueue.py
# setup.sh copies this to message_queue.config.yaml in this directory (gitignored).
# Fill in local Dropbox paths and credentials; do not commit the live file.
#
# Each festival uses its own root-level Dropbox alert folder (created by
# promoter_admin as /{Festival name}_Alert_Files). Map the local synced path
# below — id must match the festival id you use in Firebase/cron, not necessarily
# the Dropbox folder name.

# FCM topic used when a festival omits topic/channel
default_topic: global

# Optional override (default: ~/omf_message_queue.log)
log_file: ~/omf_message_queue.log

# Directory of Firebase service-account JSON files (gitignored).
# For credentials_tag: mdf  the monitor looks for:
#   mdf.json
#   google{tag}Auth.json   e.g. google70KbandsAuth.json
#   mdf-firebase-adminsdk.json
credentials_dir: ~/omf_fcm_credentials

festivals:
  - id: mdf
    name: MDF
    default_title: "MDF Band Announcement"
    dropbox_dir: "/Users/YOU/Library/CloudStorage/Dropbox/Maryland Deathfest_Alert_Files"
    credentials_tag: mdf
    topic: global

  - id: rwmf
    name: RWMF
    default_title: "RWMF Band Announcement"
    dropbox_dir: "/Users/YOU/Library/CloudStorage/Dropbox/Redwood Metafest_Alert_Files"
    credentials_tag: rwmf
    topic: global

  - id: 70k
    name: "70K"
    default_title: "70K Bands Alert"
    dropbox_dir: "/Users/YOU/Library/CloudStorage/Dropbox/70K_Alert_Files"
    credentials_file: ~/omf_fcm_credentials/google70KbandsAuth.json
    topic: global
